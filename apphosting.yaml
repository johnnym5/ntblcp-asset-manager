# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The runtime to use for this backend. App Hosting automatically detects Next.js.
# No build or run commands are needed.

# Settings for scaling and instance management.
runConfig:
  # Automatically spin up more instances in response to traffic.
  maxInstances: 10

# Environment variables available at build and runtime.
# These values should be configured in the Firebase Console or local .env.local file.
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "FIREBASE_API_KEY_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "FIREBASE_AUTH_DOMAIN_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: "FIREBASE_DATABASE_URL_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "ntblcp-asset-manager"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "FIREBASE_STORAGE_BUCKET_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "FIREBASE_SENDER_ID_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "FIREBASE_APP_ID_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_INITIAL_ADMIN_USER
    value: "ADMIN_USERNAME_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_INITIAL_ADMIN_PASSWORD
    value: "ADMIN_PASSWORD_PLACEHOLDER"
    availability:
      - BUILD
      - RUNTIME
