# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The runtime to use for this backend. App Hosting automatically detects Next.js.
# No build or run commands are needed.

# Settings for scaling and instance management.
runConfig:
  # Automatically spin up more instances in response to traffic.
  maxInstances: 10

# Environment variables available at build and runtime.
# Deployment Reroute: Assetain Production Site
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDhBbeiAZGWzCHQXbbTcNXdsIT_6Gz3qJU"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "assetain.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: "https://ntblcp-asset-manager-default-rtdb.firebaseio.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "ntblcp-asset-manager"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "ntblcp-asset-manager.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "573481845773"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:573481845773:web:5040ae77a51681c05bc144"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_INITIAL_ADMIN_USER
    value: "admin"
    availability:
