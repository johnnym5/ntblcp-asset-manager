# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The runtime to use for this backend. App Hosting automatically detects Next.js.
# No build or run commands are needed.

# Settings for scaling and instance management.
runConfig:
  # Automatically spin up more instances in response to traffic.
  maxInstances: 10

# Environment variables that will be passed to the build and runtime environments.
# These variables are NOT stored in your source code. You'll set them in the
# Firebase Console for your App Hosting backend.
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
